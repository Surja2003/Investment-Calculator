<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
      // Simple and robust SPA Redirect for GitHub Pages
      var l = window.location;
      var redirectUrl = l.protocol + '//' + l.host + '/Investment-Calculator/?p=' + encodeURIComponent(l.pathname + l.search) + l.hash;
      l.replace(redirectUrl);
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
